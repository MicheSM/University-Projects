[General]
network = WirelessLink
sim-time-limit = 10h
output-scalar-file = results/${configname}/${iterationvars}-${repetition}.sca
output-vector-file = results/${configname}/${iterationvars}-${repetition}.vec
num-rngs = 3
**.tx.rng-0 = 0 # inter-arrival time of packets
**.tx.rng-1 = 1 # packet size
**.rx.rng-0 = 2 # fragment probability error 

seed-set = ${repetition}

[Config Bluetooth]
**.dimHeader = 11B
**.bandwidthChannel = 1Mbps 
**.dimFragment = 20B
**.dimAck = 10B
repeat = 30

[Config Bluetooth_AudioStreaming]
extends = Bluetooth
**.minSizePkt = 500B
**.maxSizePkt = 2000B
**.alpha = ${0.0005, 0.001}
**.meanInterTimePkt = 0.02s
**.dimFragment = ${60, 120, 240, 300}B
warmup-period = 2000s
sim-time-limit = 2h

[Config Bluetooth_Industrial]
extends = Bluetooth
**.minSizePkt = 6000B
**.maxSizePkt = 8000B
**.alpha = ${0.005, 0.01}
**.meanInterTimePkt = 0.5s
**.dimFragment = ${20, 60, 120, 200}B
warmup-period = 2000s
sim-time-limit = 2h

[Config Bluetooth_Sensors]
extends = Bluetooth
**.minSizePkt = 20B
**.maxSizePkt = 100B
**.alpha = ${0.005, 0.01}
**.meanInterTimePkt = 0.002s
**.dimFragment = ${20, 40, 60, 80}B
warmup-period = 800s
sim-time-limit = 0.75h

# TESTING
[Config TestingBaseConfig]
**.dimHeader = 20B
**.bandwidthChannel = 1Mbps
**.dimFragment = 100B
**.dimAck = 20B
**.alpha = 0.0001
repeat = 30
**.vector-recording = false

# CONTINUITY TEST
# higher load to see throughput diminishing
[Config Continuity_alpha]
extends = TestingBaseConfig
**.minSizePkt = 200B
**.maxSizePkt = 500B
**.meanInterTimePkt = 0.1s
**.bandwidthChannel = 60kbps
**.alpha = ${0.001, 0.00105, 0.0011}

# low load (1Mbps bw) to show no change in throughput
[Config Continuity_alpha_low_rho]
extends = TestingBaseConfig
**.minSizePkt = 200B
**.maxSizePkt = 500B
**.meanInterTimePkt = 0.1s
**.alpha = ${0.001, 0.00105, 0.0011}

[Config Continuity_IntArrivTime]
extends = TestingBaseConfig
**.minSizePkt = 200B
**.maxSizePkt = 500B
**.meanInterTimePkt = ${1s, 1.0025s, 1.005s}

[Config Continuity_PacketSize]
extends = TestingBaseConfig
**.minSizePkt = ${200B, 205B, 210B}
**.maxSizePkt = ${500B, 505B, 510B}
**.meanInterTimePkt = 1s

# CONSISTENCY TEST
# COMPARISON BETWEEN PACKETS IN [500, 800]B WITH INTERARR. TIME = 1s (FIRST)
# AND PACKETS IN [1000, 1600] WITH INTERARR. TIME = 2s (SECOND), SO THAT RATE IS THE SAME
[Config Consistency_First]
extends = TestingBaseConfig
**.minSizePkt = 500B
**.maxSizePkt = 800B
**.meanInterTimePkt = 1s

[Config Consistency_Second]
extends = TestingBaseConfig
**.minSizePkt = 1000B
**.maxSizePkt = 1600B
**.meanInterTimePkt = 2s

# DEGENERACY TEST
[Config DegeneracyTests]
extends = TestingBaseConfig
**.minSizePkt = 500B
**.maxSizePkt = 800B
**.meanInterTimePkt = 1s

# Very huge fragments, should see high number of retransmissions
[Config Degeneracy_HugeFragments]
extends = DegeneracyTests
**.minSizePkt = 10000B
**.maxSizePkt = 10000B
**.dimFragment = 10000B
**.alpha = 0.001

[Config Degeneracy_No_Error]
extends = DegeneracyTests
**.alpha = 0

[Config Degeneracy_OnlyErrors]
extends = DegeneracyTests
**.alpha = 1